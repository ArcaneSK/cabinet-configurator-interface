<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Cabinet with Babylon.js</title>
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>

    <style>
        #renderCanvas {
            width: 100%;
            height: 90vh; /* Full height of the viewport */
            touch-action: none;
        }
        #controls {
            position: absolute;
            top: 10px;
            left: 10px;
            padding: 10px;
            font-size: 16px;
            z-index: 100;
            background-color: rgba(255, 255, 255, 0.8);
            border-radius: 5px;
            max-width: 200px;
        }
        #controls label {
            display: block;
            margin-top: 10px;
        }
        #controls input[type="range"],
        #controls select {
            width: 100%;
        }
        #controls button {
            margin-top: 10px;
            width: 100%;
        }
    </style>
</head>
<body>
    <canvas id="renderCanvas" touch-action="none"></canvas>
